re every student feels empowered to explore, question, and discover the beauty of mathematics. Together, we can build a community that celebrates both rigorous thinking and creative problem-solving.",achievements:["National Math Olympiad Silver Medalist",'Organized "MathFest 2025" with 200+ participants',"Published research paper on Number Theory","Tutored 50+ students in Calculus and Linear Algebra"],socials:{email:"arif@mathclub.edu"}},{id:"fatima-khan",name:"Fatima Khan",position:"President",department:"Mathematics",year:"3rd Year",tagline:'"Innovation Through Numbers"',bio:"Fatima combines her love for pure mathematics with a passion for technology. She has developed several math visualization tools and believes technology can revolutionize how we learn and teach mathematics. She wants to bring a fresh, modern approach to the Math Club.",avatar:"📐",color:"from-purple-500 to-pink-600",profilePicture:"/images/fatima-profile.jpg",symbol:"/images/symbol-lightbulb.png",promises:["Launch a Math Club website and mobile app","Coding workshops combining math and programming","Annual math hackathon event","Scholarship fund for math competition participants","Collaboration with CS and Physics departments","Weekly math puzzle newsletter"],vision:"Mathematics is the language of the universe, and our club should speak it fluently. I want to create an environment where traditional mathematical beauty meets modern technology. Let's build bridges between departments, create tools that make learning fun, and show the world that math is everywhere.",achievements:['Developed "MathViz" - a visualization tool used by 300+ students',"Won Best Project at Inter-Department Science Fair","Teaching Assistant for Discrete Mathematics","Founded Women in Mathematics initiative"],socials:{email:"fatima@mathclub.edu"}},{id:"rahman-uddin",name:"Rahman Uddin",position:"President",department:"Mathematics",year:"4th Year",tagline:'"Unity in Equations"',bio:"Rahman is a senior student with extensive
